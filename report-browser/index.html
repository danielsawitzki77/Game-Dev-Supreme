<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Report Browser</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
header { background: #16213e; padding: 1rem 2rem; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 1rem; }
header h1 { font-size: 1.4rem; color: #e94560; }
header .count { color: #888; font-size: 0.9rem; }
.controls { display: flex; gap: 0.5rem; padding: 1rem 2rem; background: #16213e; border-bottom: 1px solid #0f3460; flex-wrap: wrap; align-items: center; }
.controls select, .controls input { background: #0f3460; color: #eee; border: 1px solid #333; padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.85rem; }
.controls input { width: 200px; }
.controls button { background: #e94560; color: #fff; border: none; padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
.controls button:hover { background: #c73e54; }
.controls button.secondary { background: #0f3460; border: 1px solid #333; }
.controls button.secondary:hover { background: #1a4a8a; }
.controls button.secondary.delete { color: #e94560; border-color: #e94560; }
.controls button.secondary.delete:hover { background: #e94560; color: #fff; }
.controls .spacer { flex: 1; }
.controls button.quit { background: #555; color: #ccc; border: 1px solid #777; }
.controls button.quit:hover { background: #e94560; color: #fff; border-color: #e94560; }
main { display: flex; height: calc(100vh - 130px); }
.list-panel { width: 400px; overflow-y: auto; border-right: 1px solid #0f3460; }
.report-item { padding: 0.75rem 1rem; border-bottom: 1px solid #0f3460; cursor: pointer; transition: background 0.15s; }
.report-item:hover { background: #0f3460; }
.report-item.active { background: #1a4a8a; border-left: 3px solid #e94560; }
.report-item .project { font-size: 0.75rem; color: #e94560; font-weight: 600; text-transform: uppercase; }
.report-item .name { font-size: 0.9rem; margin: 0.2rem 0; }
.report-item .meta { font-size: 0.75rem; color: #888; display: flex; gap: 0.5rem; }
.report-item .type-badge { background: #0f3460; padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.7rem; }
.report-item .type-badge.visual { color: #4ecdc4; border: 1px solid #4ecdc4; }
.report-item .type-badge.integration { color: #ffd93d; border: 1px solid #ffd93d; }
.report-item .type-badge.screenshots { color: #6c63ff; border: 1px solid #6c63ff; }
.report-item .type-badge.general { color: #888; border: 1px solid #555; }
.content-panel { flex: 1; overflow-y: auto; padding: 2rem; }
.content-panel .rendered { line-height: 1.7; }
.content-panel .rendered h1 { font-size: 1.5rem; color: #e94560; margin: 1.2rem 0 0.5rem; }
.content-panel .rendered h2 { font-size: 1.2rem; color: #4ecdc4; margin: 1rem 0 0.5rem; }
.content-panel .rendered h3 { font-size: 1rem; color: #ffd93d; margin: 0.8rem 0 0.3rem; }
.content-panel .rendered p { margin: 0.5rem 0; }
.content-panel .rendered code { background: #0f3460; padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.85rem; }
.content-panel .rendered pre { background: #0f3460; padding: 1rem; border-radius: 6px; margin: 0.5rem 0; overflow-x: auto; }
.content-panel .rendered pre code { background: none; padding: 0; }
.content-panel .rendered table { border-collapse: collapse; margin: 0.5rem 0; width: 100%; }
.content-panel .rendered th, .content-panel .rendered td { border: 1px solid #333; padding: 0.4rem 0.6rem; text-align: left; }
.content-panel .rendered th { background: #0f3460; font-weight: 600; }
.content-panel .rendered img { max-width: 100%; border-radius: 4px; margin: 0.5rem 0; }
.content-panel .rendered a { color: #4ecdc4; text-decoration: none; }
.content-panel .rendered a:hover { text-decoration: underline; }
.content-panel .rendered hr { border: none; border-top: 1px solid #333; margin: 1rem 0; }
.content-panel .rendered ul, .content-panel .rendered ol { margin: 0.5rem 0 0.5rem 1.5rem; }
.content-panel .rendered li { margin: 0.2rem 0; }
.content-panel .rendered blockquote { border-left: 3px solid #4ecdc4; padding-left: 1rem; color: #aaa; margin: 0.5rem 0; }
.content-panel .rendered strong { color: #fff; }
.empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 1.1rem; }
.actions { display: flex; gap: 0.5rem; margin-top: 0.4rem; }
.actions button { font-size: 0.7rem; padding: 0.2rem 0.5rem; background: #333; border: 1px solid #555; color: #aaa; border-radius: 3px; cursor: pointer; }
.actions button:hover { background: #555; color: #fff; }
.actions button.delete:hover { background: #e94560; border-color: #e94560; }
</style>
</head>
<body>
<header>
  <h1>📊 Test Report Browser</h1>
  <span class="count" id="count"></span>
</header>
<div class="controls">
  <select id="filter-project"><option value="">All Projects</option></select>
  <select id="filter-type">
    <option value="">All Types</option>
    <option value="visual">Visual Regression</option>
    <option value="integration">Integration Test</option>
    <option value="screenshots">Screenshot Capture</option>
    <option value="general">General Report</option>
  </select>
  <input type="text" id="filter-search" placeholder="Search reports...">
  <button class="secondary" onclick="loadReports()">↻ Refresh</button>
  <button class="secondary delete" onclick="deleteFiltered()">🗑 Delete Filtered</button>
  <span class="spacer"></span>
  <button class="quit" onclick="quitServer()">⏹ Quit Server</button>
</div>
<main>
  <div class="list-panel" id="list"></div>
  <div class="content-panel" id="content"><div class="empty-state">Select a report to view</div></div>
</main>
<script>
let allReports = [];
let activeReport = null;
let activeReportDir = null; // directory of the active report (for resolving relative image paths)

async function loadReports() {
  const res = await fetch('/api/reports');
  allReports = await res.json();
  populateProjectFilter();
  renderList();
}

function populateProjectFilter() {
  const sel = document.getElementById('filter-project');
  const projects = [...new Set(allReports.map(r => r.project))].sort();
  sel.innerHTML = '<option value="">All Projects</option>' + projects.map(p => `<option value="${p}">${p}</option>`).join('');
}

function getFiltered() {
  const proj = document.getElementById('filter-project').value;
  const type = document.getElementById('filter-type').value;
  const search = document.getElementById('filter-search').value.toLowerCase();
  return allReports.filter(r => {
    if (proj && r.project !== proj) return false;
    if (type && r.type !== type) return false;
    if (search && !r.name.toLowerCase().includes(search) && !r.dir.toLowerCase().includes(search) && !r.project.toLowerCase().includes(search)) return false;
    return true;
  });
}

function renderList() {
  const filtered = getFiltered();
  document.getElementById('count').textContent = `${filtered.length} of ${allReports.length} reports`;
  const html = filtered.map(r => `
    <div class="report-item ${activeReport === r.path ? 'active' : ''}" onclick="viewReport('${escapeJs(r.path)}')">
      <div class="project">${esc(r.project)}</div>
      <div class="name">${esc(r.dir === '.' ? r.name : r.dir + '/' + r.name)}</div>
      <div class="meta">
        <span class="type-badge ${r.type}">${esc(r.type)}</span>
        <span>${formatSize(r.size)}</span>
        <span>${formatDate(r.modified)}</span>
      </div>
      <div class="actions">
        <button onclick="event.stopPropagation(); deleteReport('${escapeJs(r.path)}');" class="delete">🗑 Delete</button>
      </div>
    </div>
  `).join('');
  document.getElementById('list').innerHTML = html || '<div class="empty-state">No reports found</div>';
}

async function viewReport(path) {
  activeReport = path;
  // Compute the directory of the report file for resolving relative paths
  const parts = path.replace(/\\/g, '/').split('/');
  parts.pop(); // remove filename
  activeReportDir = parts.join('/');
  renderList();
  const res = await fetch(`/api/report-content?path=${encodeURIComponent(path)}`);
  const text = await res.text();
  document.getElementById('content').innerHTML = `<div class="rendered">${renderMarkdown(text)}</div>`;
}

async function deleteReport(path) {
  if (!confirm('Delete this report file?')) return;
  await fetch('/api/delete-report', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({path}) });
  loadReports();
  if (activeReport === path) {
    activeReport = null;
    document.getElementById('content').innerHTML = '<div class="empty-state">Report deleted</div>';
  }
}

async function deleteFiltered() {
  const filtered = getFiltered();
  if (!filtered.length) return;
  if (!confirm(`Delete ${filtered.length} report(s) matching current filters?`)) return;
  for (const r of filtered) {
    await fetch('/api/delete-report', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({path: r.path}) });
  }
  activeReport = null;
  document.getElementById('content').innerHTML = '<div class="empty-state">Reports deleted</div>';
  loadReports();
}

async function quitServer() {
  if (!confirm('Shut down the report browser server?')) return;
  try { await fetch('/api/shutdown'); } catch(e) {}
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#888;font-size:1.2rem;">Server stopped. You can close this tab.</div>';
}

/**
 * Proper Markdown-to-HTML renderer.
 * Handles: headers, bold, italic, code blocks, inline code, tables,
 * images (with relative path resolution), links, lists, blockquotes, hrs.
 */
function renderMarkdown(md) {
  // Normalize line endings
  md = md.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

  let html = '';
  const lines = md.split('\n');
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    // Fenced code block
    if (line.match(/^```/)) {
      let code = '';
      i++;
      while (i < lines.length && !lines[i].match(/^```/)) {
        code += esc(lines[i]) + '\n';
        i++;
      }
      i++; // skip closing ```
      html += `<pre><code>${code}</code></pre>`;
      continue;
    }

    // Table detection: line with pipes and next line is separator
    if (line.includes('|') && i + 1 < lines.length && lines[i + 1].match(/^\|?\s*[-:]+[-|:\s]*$/)) {
      html += renderTable(lines, i);
      // Skip past table
      i++;  // header
      i++;  // separator
      while (i < lines.length && lines[i].includes('|') && lines[i].trim() !== '') {
        i++;
      }
      continue;
    }

    // Heading
    const headingMatch = line.match(/^(#{1,6})\s+(.+)$/);
    if (headingMatch) {
      const level = headingMatch[1].length;
      html += `<h${level}>${inline(headingMatch[2])}</h${level}>`;
      i++;
      continue;
    }

    // Horizontal rule
    if (line.match(/^(-{3,}|\*{3,}|_{3,})\s*$/)) {
      html += '<hr>';
      i++;
      continue;
    }

    // Blockquote
    if (line.match(/^>\s?/)) {
      let bq = '';
      while (i < lines.length && lines[i].match(/^>\s?/)) {
        bq += lines[i].replace(/^>\s?/, '') + '\n';
        i++;
      }
      html += `<blockquote>${inline(bq.trim())}</blockquote>`;
      continue;
    }

    // Unordered list
    if (line.match(/^[\s]*[-*+]\s/)) {
      html += '<ul>';
      while (i < lines.length && lines[i].match(/^[\s]*[-*+]\s/)) {
        html += `<li>${inline(lines[i].replace(/^[\s]*[-*+]\s/, ''))}</li>`;
        i++;
      }
      html += '</ul>';
      continue;
    }

    // Ordered list
    if (line.match(/^[\s]*\d+\.\s/)) {
      html += '<ol>';
      while (i < lines.length && lines[i].match(/^[\s]*\d+\.\s/)) {
        html += `<li>${inline(lines[i].replace(/^[\s]*\d+\.\s/, ''))}</li>`;
        i++;
      }
      html += '</ol>';
      continue;
    }

    // Empty line
    if (line.trim() === '') {
      i++;
      continue;
    }

    // Paragraph
    let para = '';
    while (i < lines.length && lines[i].trim() !== '' && !lines[i].match(/^#{1,6}\s/) && !lines[i].match(/^```/) && !lines[i].match(/^(-{3,}|\*{3,}|_{3,})\s*$/) && !lines[i].match(/^>\s?/)) {
      para += (para ? ' ' : '') + lines[i];
      i++;
    }
    html += `<p>${inline(para)}</p>`;
  }

  return html;
}

function renderTable(lines, startIdx) {
  const headerLine = lines[startIdx];
  const sepLine = lines[startIdx + 1];

  const headerCells = splitTableRow(headerLine);
  // Determine alignment from separator
  const sepCells = splitTableRow(sepLine);
  const aligns = sepCells.map(c => {
    c = c.trim();
    if (c.startsWith(':') && c.endsWith(':')) return 'center';
    if (c.endsWith(':')) return 'right';
    return 'left';
  });

  let tableHtml = '<table><thead><tr>';
  headerCells.forEach((cell, idx) => {
    const align = aligns[idx] || 'left';
    tableHtml += `<th style="text-align:${align}">${inline(cell.trim())}</th>`;
  });
  tableHtml += '</tr></thead><tbody>';

  let i = startIdx + 2;
  while (i < lines.length && lines[i].includes('|') && lines[i].trim() !== '') {
    const cells = splitTableRow(lines[i]);
    tableHtml += '<tr>';
    cells.forEach((cell, idx) => {
      const align = aligns[idx] || 'left';
      tableHtml += `<td style="text-align:${align}">${inline(cell.trim())}</td>`;
    });
    tableHtml += '</tr>';
    i++;
  }
  tableHtml += '</tbody></table>';
  return tableHtml;
}

function splitTableRow(line) {
  // Remove leading/trailing pipe and split by pipe
  line = line.trim();
  if (line.startsWith('|')) line = line.slice(1);
  if (line.endsWith('|')) line = line.slice(0, -1);
  return line.split('|');
}

/**
 * Process inline markdown: bold, italic, code, images, links
 */
function inline(text) {
  if (!text) return '';
  // Escape HTML entities
  text = esc(text);

  // Inline code (must come before other processing to avoid conflicts)
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Images: ![alt](src) — resolve relative paths through /api/file/
  text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, src) => {
    const resolvedSrc = resolveImagePath(src);
    return `<img alt="${alt}" src="${resolvedSrc}" loading="lazy">`;
  });

  // Links: [text](url)
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');

  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/_(.+?)_/g, '<em>$1</em>');

  // Strikethrough
  text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');

  return text;
}

/**
 * Resolve image paths. If the path is relative, resolve it against
 * the directory of the currently viewed report, then serve via /api/file/.
 * If already absolute URL, leave as-is.
 */
function resolveImagePath(src) {
  // Already a full URL
  if (src.startsWith('http://') || src.startsWith('https://') || src.startsWith('data:')) {
    return src;
  }
  // Resolve relative to report directory
  if (activeReportDir) {
    const dirParts = activeReportDir.split('/');
    const srcParts = src.replace(/\\/g, '/').split('/');
    // Handle ../ in relative path
    const resolved = [...dirParts];
    for (const part of srcParts) {
      if (part === '..') resolved.pop();
      else if (part !== '.') resolved.push(part);
    }
    return '/api/file/' + encodeURIComponent(resolved.join('/'));
  }
  return '/api/file/' + encodeURIComponent(src);
}

function esc(text) {
  const el = document.createElement('span');
  el.textContent = text;
  return el.innerHTML;
}

function escapeJs(str) {
  return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function formatSize(bytes) { return bytes < 1024 ? bytes + 'B' : (bytes / 1024).toFixed(1) + 'KB'; }
function formatDate(ts) { return new Date(ts * 1000).toLocaleDateString('en-US', {month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'}); }

document.getElementById('filter-project').addEventListener('change', renderList);
document.getElementById('filter-type').addEventListener('change', renderList);
document.getElementById('filter-search').addEventListener('input', renderList);

loadReports();
</script>
</body>
</html>
